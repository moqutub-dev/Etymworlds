// ─── World Intro Screen ────────────────────────────────────────────────────────
const WorldIntroScreen = ({ world, onBegin, onBack }) => {
  const [hovered, setHovered] = useState(false);
  const playedRef = useRef(false);

  // Get the pre-built <audio> DOM element for this world
  const getAudioEl = () => document.getElementById("intro-audio-" + world.id);

  useEffect(() => {
    // Reset state when world changes
    playedRef.current = false;
    // Try autoplay — will work if a prior gesture exists (e.g. tapping the world on home screen)
    const timer = setTimeout(() => tryPlay(), 300);
    return () => {
      clearTimeout(timer);
      const el = getAudioEl();
      if (el) { el.pause(); el.currentTime = 0; }
    };
  }, [world.id]);

  // First tap anywhere on the intro screen triggers playback (satisfies autoplay policy)
  const tryPlay = () => {
    if (!playedRef.current) {
      playedRef.current = true;
      const el = getAudioEl();
      if (el) {
        el.volume = 0.45;
        el.load();
        const p = el.play();
        if (p !== undefined) {
          p.then(() => console.log("intro audio playing:", world.id))
           .catch((e) => {
             console.warn("intro audio failed:", world.id, e.message);
             // Reset so user can try again
             playedRef.current = false;
           });
        }
      } else {
        console.warn("audio element not found: intro-audio-" + world.id);
      }
    }
  };

  const stopAndDo = (fn) => {
    const el = getAudioEl();
    if (el) { el.pause(); el.currentTime = 0; }
    fn();
  };

  return (
    <div
      onClick={tryPlay}
      onTouchStart={tryPlay}
      style={{
      position: "fixed", inset: 0, zIndex: 20,
      display: "flex", alignItems: "center", justifyContent: "center",
      padding: "16px",
      backgroundImage: world.introImageUrl
        ? `url(${world.introImageUrl})`
        : world.bgImageUrl
        ? `url(${world.bgImageUrl})`
        : "none",
      backgroundColor: "#0f0a19",
      backgroundSize: "cover",
      backgroundPosition: "center center",
    }}>
      {/* Dark gradient overlay for text readability — extra-strong for title screens */}
      <div style={{
        position: "absolute", inset: 0,
        background: "linear-gradient(180deg, rgba(0,0,0,0.82) 0%, rgba(0,0,0,0.65) 40%, rgba(0,0,0,0.88) 100%)",
        pointerEvents: "none",
      }}/>

      {/* Back button — top-left, above frosted layer */}
      <button
        onClick={() => stopAndDo(onBack)}
        style={{
          position: "absolute", top: 16, left: 16, zIndex: 2,
          background: "rgba(255,255,255,0.08)",
          border: "1px solid rgba(255,255,255,0.15)",
          color: "#fff", borderRadius: "10px",
          padding: "6px 14px", fontSize: "13px",
          cursor: "pointer", fontFamily: "Georgia,serif",
        }}
      >← Back</button>



      {/* Card */}
      <div style={{
        position: "relative", zIndex: 2,
        width: "100%", maxWidth: "460px",
        maxHeight: "calc(100svh - 80px)",
        overflowY: "auto",
        borderRadius: "24px",
        padding: "28px 28px 32px",
        background: "rgba(255,255,255,0.04)",
        border: "1px solid rgba(255,255,255,0.10)",
        boxShadow: `0 8px 48px rgba(0,0,0,0.6), 0 0 0 1px ${world.accentColor}18`,
        display: "flex", flexDirection: "column", alignItems: "center",
        textAlign: "center", fontFamily: "Georgia,serif",
        scrollbarWidth: "none",
      }}>

        {/* Emoji badge */}
        <div style={{
          width: 80, height: 80, borderRadius: "22px",
          background: `${world.color}35`,
          border: `1.5px solid ${world.accentColor}55`,
          display: "flex", alignItems: "center", justifyContent: "center",
          fontSize: "40px", marginBottom: "20px",
          boxShadow: `0 0 32px ${world.accentColor}25`,
        }}>
          {world.emoji}
        </div>

        {/* Eyebrow */}
        <div style={{
          color: world.accentColor, fontSize: "10px",
          letterSpacing: "3px", textTransform: "uppercase",
          fontWeight: "700", marginBottom: "8px",
        }}>
          Etymology Quest
        </div>

        {/* World name */}
        <div style={{
          color: "#fff", fontSize: "26px", fontWeight: "700",
          lineHeight: 1.2, marginBottom: "18px",
        }}>
          {world.name}
        </div>

        {/* Historical summary */}
        <div style={{
          color: "rgba(255,255,255,0.90)", fontSize: "21px",
          lineHeight: "1.75", marginBottom: "24px",
          textAlign: "left",
        }}>
          {world.historicalSummary}
        </div>

        {/* Historical facts */}
        <div style={{
          width: "100%", display: "flex", flexDirection: "column",
          gap: "10px", marginBottom: "32px",
        }}>
          {(world.historicalFacts || []).map((fact, i) => (
            <div key={i} style={{
              background: `${world.accentColor}10`,
              border: `1px solid ${world.accentColor}30`,
              borderLeft: `3px solid ${world.accentColor}`,
              borderRadius: "10px", padding: "12px 14px",
              textAlign: "left",
              display: "flex", alignItems: "flex-start", gap: "10px",
            }}>
              <span style={{
                color: world.accentColor, fontSize: "13px",
                flexShrink: 0, marginTop: "1px",
              }}>✦</span>
              <span style={{
                color: "rgba(255,255,255,0.82)", fontSize: "19.5px",
                lineHeight: "1.6",
              }}>{fact}</span>
            </div>
          ))}
        </div>

        {/* Enter World button */}
        <button
          onClick={() => stopAndDo(onBegin)}
          onMouseEnter={() => setHovered(true)}
          onMouseLeave={() => setHovered(false)}
          style={{
            background: world.color,
            border: "none", borderRadius: "14px",
            padding: "15px 48px",
            color: "#fff", fontSize: "16px", fontWeight: "700",
            cursor: "pointer", fontFamily: "Georgia,serif",
            letterSpacing: "0.5px",
            boxShadow: `0 4px 24px ${world.color}70`,
            transform: hovered ? "scale(1.04)" : "scale(1)",
            transition: "transform 0.18s ease, box-shadow 0.18s ease",
          }}
        >
          Enter World {world.emoji}
        </button>
      </div>
    </div>
  );
};

          {/* Socket rings */}

  // Fallback for unknown keys

// ─── Language Tree ─────────────────────────────────────────────────────────────
const LanguageTree = ({ completedWorlds, unlockedWords, milestoneGlowWorld, onGlowShown, onClose }) => {
  const [selectedWorldId, setSelectedWorldId] = useState(null);

  // Approximate map position for each world's historical origin, as a percentage
  // of the map's width/height — a simplified, stylised layout, not literal cartography.
  const REGIONS = [
    { id:"arabic",        x:57, y:46 },  // Middle East
    { id:"greek",         x:51, y:38 },  // Eastern Mediterranean
    { id:"celtic",        x:32, y:24 },  // British Isles / Ireland
    { id:"anglo_saxon",   x:40, y:20 },  // Northern Europe / England
    { id:"norman_french", x:38, y:30 },  // France
    { id:"spanish",       x:30, y:38 },  // Iberia
    { id:"norse",         x:44, y:10 },  // Scandinavia
    { id:"sanskrit",      x:70, y:52 },  // South Asia
  ];

  const worldProgress = (w) => {
    const total  = w.levels.reduce((sum, lvl) => sum + lvl.words.length, 0);
    const solved = (unlockedWords[w.id] || []).length;
    return { solved, total, pct: total > 0 ? Math.min(1, solved / total) : 0 };
  };

  const totalWordsAll = Object.values(unlockedWords).flat().length;

  // ── Detail view: shown after tapping a region ──────────────────────────────
  if (selectedWorldId) {
    const w = WORLDS.find(x => x.id === selectedWorldId);
    const { solved, total, pct } = worldProgress(w);
    const words = unlockedWords[w.id] || [];
    const done  = completedWorlds.includes(w.id);
    return (
      <div style={{position:"fixed",inset:0,background:`linear-gradient(180deg,#0a1a0a,${w.color}22 60%,#0d2410)`,zIndex:100,display:"flex",flexDirection:"column",alignItems:"center",fontFamily:"Georgia,serif",overflowY:"auto"}}>
        <div style={{width:"100%",maxWidth:"420px",padding:"20px 20px 40px"}}>
          <button onClick={() => setSelectedWorldId(null)} style={{background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.15)",color:"#fff",borderRadius:"10px",padding:"7px 14px",fontSize:"13px",cursor:"pointer",marginBottom:"20px"}}>← Map</button>

          <div style={{textAlign:"center",marginBottom:"24px"}}>
            <div style={{width:"88px",height:"88px",borderRadius:"50%",margin:"0 auto 14px",background:`${w.accentColor}25`,border:`2px solid ${w.accentColor}80`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"40px",boxShadow:done?`0 0 30px ${w.accentColor}70`:"none"}}>{w.emoji}</div>
            <div style={{color:"#fff",fontSize:"22px",fontWeight:"700",marginBottom:"4px"}}>{w.name}</div>
            <div style={{color:w.accentColor,fontSize:"12px",letterSpacing:"1px"}}>{done ? "MASTERED" : `${solved}/${total} words unlocked`}</div>
          </div>

          <div style={{width:"100%",height:"8px",borderRadius:"4px",background:"rgba(255,255,255,0.08)",overflow:"hidden",marginBottom:"28px"}}>
            <div style={{width:`${pct*100}%`,height:"100%",background:w.accentColor,borderRadius:"4px",transition:"width 0.5s ease",boxShadow:pct>0?`0 0 8px ${w.accentColor}`:"none"}}/>
          </div>

          {words.length > 0 ? (
            <div style={{display:"flex",flexWrap:"wrap",gap:"8px",justifyContent:"center"}}>
              {words.map((wd,i) => (
                <span key={i} style={{background:`${w.accentColor}20`,border:`1px solid ${w.accentColor}50`,color:w.accentColor,borderRadius:"20px",padding:"5px 13px",fontSize:"12px",fontWeight:"600"}}>{wd}</span>
              ))}
            </div>
          ) : (
            <div style={{textAlign:"center",color:"rgba(255,255,255,0.35)",fontSize:"13px",marginTop:"20px"}}>
              Not yet explored — jump into this world to begin uncovering its words.
            </div>
          )}
        </div>
      </div>
    );
  }

  // ── Overview: the world map ─────────────────────────────────────────────────
  return (
    <div style={{position:"fixed",inset:0,background:"linear-gradient(180deg,#0a1420,#0d1c28)",zIndex:100,display:"flex",flexDirection:"column",alignItems:"center",fontFamily:"Georgia,serif",overflowY:"auto"}}>
      <div style={{padding:"24px 20px 4px",textAlign:"center",flexShrink:0}}>
        <div style={{color:"#7ec4e8",fontSize:"11px",letterSpacing:"3px",textTransform:"uppercase",marginBottom:"6px"}}>Your Collection</div>
        <div style={{color:"#fff",fontSize:"24px",fontWeight:"700"}}>Etymology Atlas</div>
        <div style={{color:"rgba(255,255,255,0.4)",fontSize:"12px",marginTop:"4px"}}>
          {totalWordsAll} words uncovered across {completedWorlds.length} of {WORLDS.length} languages
        </div>
      </div>

      <div style={{position:"relative",width:"min(420px,94vw)",aspectRatio:"1.4",margin:"18px 0 10px"}}>
        <svg viewBox="0 0 140 100" style={{width:"100%",height:"100%",display:"block"}}>
          <defs>
            <radialGradient id="atlasGlow" cx="50%" cy="50%" r="70%">
              <stop offset="0%" stopColor="#1a3550" stopOpacity="0.9"/>
              <stop offset="100%" stopColor="#0a1420" stopOpacity="0"/>
            </radialGradient>
          </defs>
          <rect x="0" y="0" width="140" height="100" fill="url(#atlasGlow)"/>
          {/* Simplified, abstract landmass shapes — not literal cartography */}
          <path d="M18 30 Q26 18 40 20 Q34 30 30 42 Q22 44 18 34 Z" fill="#1c3a52" opacity="0.7"/>
          <path d="M34 12 Q46 6 58 12 Q54 20 46 22 Q38 20 34 12 Z" fill="#1c3a52" opacity="0.7"/>
          <path d="M44 22 Q58 20 66 30 Q62 42 52 46 Q42 40 44 22 Z" fill="#1c3a52" opacity="0.7"/>
          <path d="M60 34 Q76 30 86 42 Q82 56 68 58 Q56 50 60 34 Z" fill="#1c3a52" opacity="0.7"/>
          <path d="M60 44 Q78 48 82 62 Q70 68 60 60 Q56 52 60 44 Z" fill="#1c3a52" opacity="0.55"/>

          {/* Region markers, one per world */}
          {REGIONS.map(r => {
            const w = WORLDS.find(x => x.id === r.id);
            if (!w) return null;
            const { pct } = worldProgress(w);
            const done = completedWorlds.includes(w.id);
            const started = pct > 0;
            const baseR = 3.2 + pct * 2.4;
            const col = started ? w.accentColor : "#3a4a5a";
            const glow = milestoneGlowWorld === w.id;
            return (
              <g key={w.id} onClick={() => setSelectedWorldId(w.id)} style={{cursor:"pointer"}}>
                {started && (
                  <circle cx={r.x} cy={r.y} r={baseR + 3} fill={col} opacity={0.18 + pct*0.15}/>
                )}
                <circle cx={r.x} cy={r.y} r={baseR} fill={done ? col : started ? `${col}cc` : "rgba(255,255,255,0.08)"}
                  stroke={started ? col : "rgba(255,255,255,0.2)"} strokeWidth={done ? 1.1 : 0.6}
                  style={{filter: done ? `drop-shadow(0 0 3px ${col})` : "none", transition:"r 0.4s ease, fill 0.4s ease"}}/>
                {glow && (
                  <circle cx={r.x} cy={r.y} r={baseR + 1.5} fill="none" stroke={col} strokeWidth="0.8" opacity="0.8"/>
                )}
                <text x={r.x} y={r.y - baseR - 2.5} textAnchor="middle" fontSize="5.5" opacity={started ? 1 : 0.45}>{w.emoji}</text>
              </g>
            );
          })}
        </svg>
      </div>

      {/* World list below the map — compact rows, tap to open detail view */}
      <div style={{padding:"8px 20px 30px",width:"100%",maxWidth:"420px"}}>
        {WORLDS.map(w => {
          const { solved, total, pct } = worldProgress(w);
          const done = completedWorlds.includes(w.id);
          const started = solved > 0;
          return (
            <button key={w.id} onClick={() => setSelectedWorldId(w.id)} style={{width:"100%",display:"flex",alignItems:"center",gap:"12px",background:started?"rgba(255,255,255,0.05)":"rgba(255,255,255,0.02)",border:`1px solid ${started?w.accentColor+"40":"#ffffff12"}`,borderRadius:"12px",padding:"11px 14px",marginBottom:"8px",cursor:"pointer",textAlign:"left"}}>
              <span style={{fontSize:"20px",opacity:started?1:0.4}}>{w.emoji}</span>
              <div style={{flex:1,minWidth:0}}>
                <div style={{color:started?"#fff":"#666",fontSize:"13px",fontWeight:"700",marginBottom:"4px"}}>{w.name}</div>
                <div style={{width:"100%",height:"4px",borderRadius:"2px",background:"rgba(255,255,255,0.08)",overflow:"hidden"}}>
                  <div style={{width:`${pct*100}%`,height:"100%",background:done?w.accentColor:`${w.accentColor}aa`,borderRadius:"2px",transition:"width 0.4s ease"}}/>
                </div>
              </div>
              <div style={{color:started?w.accentColor:"#555",fontSize:"11px",fontWeight:"600",flexShrink:0}}>{done?"✓":`${solved}/${total}`}</div>
            </button>
          );
        })}
      </div>

      <button onClick={onClose} style={{position:"fixed",top:"16px",right:"16px",background:"rgba(255,255,255,0.1)",border:"1px solid rgba(255,255,255,0.2)",color:"#fff",borderRadius:"50%",width:"40px",height:"40px",fontSize:"18px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
    </div>
  );
};

// ─── Word Chips Row ────────────────────────────────────────────────────────────
const WordChipsRow = ({
  words, solvedWords, previewSlots, syllableHints, definitionHints,
  goldLeaves, worldColor, accentColor,
  onDefinitionHint, onSyllableHint, shake
}) => {
  const [activeChip, setActiveChip] = useState(null);

  // Close popover when a word gets solved
  useEffect(() => {
    if (activeChip !== null && solvedWords.has(words[activeChip]?.word)) {
      setActiveChip(null);
    }
  }, [solvedWords, activeChip, words]);

  const previewText = previewSlots.join("");

  return (
    <>
      <div style={{
        display:"flex", gap:"8px", padding:"0 14px",
        overflowX:"auto", scrollbarWidth:"none",
        WebkitOverflowScrolling:"touch",
        position:"relative", zIndex:2,
        paddingBottom:"2px",
      }}>
        {words.map((w, wi) => {
          const solved = solvedWords.has(w.word);
          const targetText = w.roots.join("");
          const isPreviewing = !solved && previewText.length > 0 && targetText.startsWith(previewText);
          const sylRevealed = syllableHints.has(w.word);
          const sylHintChars = sylRevealed ? w.roots[0].length : 0;
          const isActive = activeChip === wi;

          return (
            <button
              key={wi}
              onClick={() => !solved && setActiveChip(isActive ? null : wi)}
              style={{
                flexShrink: 0,
                padding: "7px 12px",
                borderRadius: "20px",
                background: solved
                  ? `${worldColor}40`
                  : isPreviewing
                  ? `${accentColor}18`
                  : isActive
                  ? `${accentColor}20`
                  : "rgba(255,255,255,0.07)",
                border: solved
                  ? `1.5px solid ${accentColor}80`
                  : isPreviewing
                  ? `1.5px solid ${accentColor}70`
                  : isActive
                  ? `1.5px solid ${accentColor}50`
                  : "1px solid rgba(255,255,255,0.15)",
                cursor: solved ? "default" : "pointer",
                transition: "all 0.2s ease",
                boxShadow: solved
                  ? `0 0 10px ${accentColor}30`
                  : isActive
                  ? `0 0 12px ${accentColor}25`
                  : "none",
                animation: shake && !solved ? "shake 0.5s ease" : "none",
                display: "flex", flexDirection: "column", alignItems: "center", gap: "3px",
                minWidth: solved ? "auto" : "auto",
              }}
            >
              {/* Letter blanks or solved word */}
              <div style={{
                display: "flex", gap: "2px", alignItems: "center"
              }}>
                {w.word.split("").map((ch, ci) => {
                  const revealedByPreview = isPreviewing && ci < Math.round(previewText.length * (w.word.length / targetText.length));
                  const revealedBySyl = ci < sylHintChars;
                  const show = solved || revealedByPreview || revealedBySyl;
                  return (
                    <span key={ci} style={{
                      fontSize: show ? "12px" : "10px",
                      fontWeight: "800",
                      color: solved
                        ? accentColor
                        : revealedBySyl || revealedByPreview
                        ? accentColor
                        : "rgba(255,255,255,0.3)",
                      letterSpacing: solved ? "1px" : "0",
                      lineHeight: 1,
                    }}>
                      {show ? ch : "·"}
                    </span>
                  );
                })}
              </div>
              {/* Word length label if unsolved */}
              {!solved && (
                <span style={{
                  fontSize: "8px",
                  color: isActive ? `${accentColor}80` : "rgba(255,255,255,0.2)",
                  letterSpacing: "0.5px",
                }}>
                  {w.word.length} letters
                </span>
              )}
              {/* Tap hint dot for unsolved */}
              {!solved && !isActive && (
                <span style={{
                  width: 4, height: 4, borderRadius: "50%",
                  background: `${accentColor}50`,
                  display: "block",
                }}/>
              )}
            </button>
          );
        })}
      </div>

      {/* Popover / bottom sheet for active chip */}
      {activeChip !== null && !solvedWords.has(words[activeChip]?.word) && (
        <WordChipPopover
          word={words[activeChip]}
          worldColor={worldColor}
          accentColor={accentColor}
          goldLeaves={goldLeaves}
          defRevealed={definitionHints.has(words[activeChip]?.word)}
          sylRevealed={syllableHints.has(words[activeChip]?.word)}
          onDefinitionHint={(wordStr) => { onDefinitionHint(wordStr); /* keep open to show revealed def */ }}
          onSyllableHint={(wordStr) => { onSyllableHint(wordStr); setActiveChip(null); }}
          onClose={() => setActiveChip(null)}
        />
      )}
    </>
  );
};

// ─── Swipe Dial ───────────────────────────────────────────────────────────────
// ─── Sound Engine (Web Audio API — no external files needed) ──────────────────
const useSounds = () => {
  const ctxRef = useRef(null);

  const getCtx = () => {
    if (!ctxRef.current) {
      ctxRef.current = new (window.AudioContext || window.webkitAudioContext)();
    }
    // Resume if suspended (browser autoplay policy)
    if (ctxRef.current.state === "suspended") ctxRef.current.resume();
    return ctxRef.current;
  };

  // ── Tick: short sine pop, pitch rises with sequenceStep ──────────────────
  const playTick = useCallback((sequenceStep = 0) => {
    try {
      const ctx  = getCtx();
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      // Base 480 Hz, each step adds ~35 Hz (semitone-ish)
      const freq = 480 + sequenceStep * 35;
      osc.type = "sine";
      osc.frequency.setValueAtTime(freq, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(freq * 0.85, ctx.currentTime + 0.06);
      gain.gain.setValueAtTime(0.18, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.07);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.08);
    } catch (_) {}
  }, []);

  // ── Success chime: bright major triad arpeggio ───────────────────────────
  const playSuccess = useCallback(() => {
    try {
      const ctx   = getCtx();
      const notes = [523.25, 659.25, 783.99]; // C5 E5 G5
      notes.forEach((freq, i) => {
        const osc  = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = "triangle";
        const t = ctx.currentTime + i * 0.07;
        osc.frequency.setValueAtTime(freq, t);
        gain.gain.setValueAtTime(0.0001, t);
        gain.gain.linearRampToValueAtTime(0.22, t + 0.03);
        gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.35);
        osc.start(t);
        osc.stop(t + 0.38);
      });
    } catch (_) {}
  }, []);

  // ── Error buzz: short dissonant low thud ────────────────────────────────
  const playError = useCallback(() => {
    try {
      const ctx  = getCtx();
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = "sawtooth";
      osc.frequency.setValueAtTime(120, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(60, ctx.currentTime + 0.12);
      gain.gain.setValueAtTime(0.25, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.18);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.2);
    } catch (_) {}
  }, []);

  // ── Level complete: sparkling upward flourish ────────────────────────────
  const playLevelComplete = useCallback(() => {
    try {
      const ctx = getCtx();
      // Rising scale of 8 bright sine notes with shimmer
      const scale = [523.25, 587.33, 659.25, 698.46, 783.99, 880, 987.77, 1046.50];
      scale.forEach((freq, i) => {
        const osc    = ctx.createOscillator();
        const gain   = ctx.createGain();
        // Add a gentle vibrato via a second LFO oscillator
        const lfo    = ctx.createOscillator();
        const lfoGain = ctx.createGain();
        lfo.connect(lfoGain);
        lfoGain.connect(osc.frequency);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = "sine";
        lfo.type = "sine";
        lfo.frequency.setValueAtTime(6, ctx.currentTime);
        lfoGain.gain.setValueAtTime(4, ctx.currentTime);
        const t = ctx.currentTime + i * 0.065;
        osc.frequency.setValueAtTime(freq, t);
        gain.gain.setValueAtTime(0.0001, t);
        gain.gain.linearRampToValueAtTime(0.16, t + 0.04);
        gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.55);
        lfo.start(t);
        lfo.stop(t + 0.6);
        osc.start(t);
        osc.stop(t + 0.6);
      });
      // Final bright shimmer chord at the top
      [1046.50, 1318.51, 1567.98].forEach((freq, i) => {
        const osc  = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = "sine";
        const t = ctx.currentTime + 0.52 + i * 0.04;
        osc.frequency.setValueAtTime(freq, t);
        gain.gain.setValueAtTime(0.0001, t);
        gain.gain.linearRampToValueAtTime(0.12, t + 0.03);
        gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.6);
        osc.start(t);
        osc.stop(t + 0.65);
      });
    } catch (_) {}
  }, []);

  return { playTick, playSuccess, playError, playLevelComplete };
};

const SwipeDial = ({ chunks, completedRoots, accentColor, worldColor, onSwipeComplete, onSwipeWrong, onSwipeMove, meaning, playTick, playError }) => {
  // ── Dynamic geometry: scale dial to fit 4–8 nodes without crowding ──────
  const nodeCount     = chunks.length;
  // Dial container stays fixed; radius and node size shrink as count grows
  const DIAL_SIZE     = 413;
  const CENTER        = DIAL_SIZE / 2;
  // DIAL_R: 96px for 4 nodes → 88px for 8 nodes (linear interpolation)
  const DIAL_R        = Math.round(153 - (nodeCount - 4) * 2.85);
  // Nodes shrink slightly: 54×38 at 4 nodes → 44×32 at 8 nodes
  const NODE_W        = Math.max(68, Math.round(86 - (nodeCount - 4) * 3.6));
  const NODE_H        = Math.max(50, Math.round(60 - (nodeCount - 4) * 2.2));
  // Hit radius also scales with node size
  const HIT_THRESHOLD = Math.max(38, Math.round(48 - (nodeCount - 4) * 2.2));
  // Stroke widths thin out at 6+ nodes to reduce visual clutter
  const STROKE_CORE   = nodeCount >= 6 ? 2   : 3;
  const STROKE_GLOW   = nodeCount >= 6 ? 10  : 14;
  const STROKE_RB     = nodeCount >= 6 ? 2   : 2.5;  // rubber-band line
  const STROKE_RB_GLW = nodeCount >= 6 ? 7   : 10;

  const nodePositions = useMemo(() =>
    chunks.map((_, i) => {
      const angle = (i / chunks.length) * Math.PI * 2 - Math.PI / 2;
      return { x: CENTER + DIAL_R * Math.cos(angle), y: CENTER + DIAL_R * Math.sin(angle) };
    }),
  [chunks]);

  const chunksRef          = useRef(chunks);
  const completedRootsRef  = useRef(completedRoots);
  const nodePositionsRef   = useRef(nodePositions);
  const onSwipeMoveRef     = useRef(onSwipeMove);
  const onSwipeCompleteRef = useRef(onSwipeComplete);
  const onSwipeWrongRef    = useRef(onSwipeWrong);

  useEffect(() => { chunksRef.current         = chunks;         }, [chunks]);
  useEffect(() => { completedRootsRef.current  = completedRoots; }, [completedRoots]);
  useEffect(() => { nodePositionsRef.current   = nodePositions;  }, [nodePositions]);
  useEffect(() => { onSwipeMoveRef.current     = onSwipeMove;    }, [onSwipeMove]);
  useEffect(() => { onSwipeCompleteRef.current = onSwipeComplete;}, [onSwipeComplete]);
  useEffect(() => { onSwipeWrongRef.current    = onSwipeWrong;   }, [onSwipeWrong]);

  const containerRef = useRef(null);
  const swipeRef     = useRef({ active: false, selected: [], lastNodeIdx: -1 });

  const [selectedIdxs, setSelectedIdxs] = useState([]);
  const [fingerPos,    setFingerPos]    = useState(null);
  const [flashState,   setFlashState]   = useState("idle");

  useEffect(() => {
    swipeRef.current = { active: false, selected: [], lastNodeIdx: -1 };
    setSelectedIdxs([]);
    setFingerPos(null);
    setFlashState("idle");
  }, [chunks]);

  const toLocal = useCallback((touch) => {
    const rect = containerRef.current.getBoundingClientRect();
    return { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
  }, []);

  const checkHit = useCallback((localPos) => {
    return nodePositionsRef.current.findIndex(pos => {
      const dx = localPos.x - pos.x;
      const dy = localPos.y - pos.y;
      return Math.sqrt(dx * dx + dy * dy) < HIT_THRESHOLD;
    });
  }, []);

  const handleTouchStart = useCallback((e) => {
    e.preventDefault();
    const touch   = e.touches[0];
    const local   = toLocal(touch);
    const idx     = checkHit(local);
    const chunks_ = chunksRef.current;
    const done_   = completedRootsRef.current;
    if (idx === -1 || done_.includes(chunks_[idx].chunk)) return;
    swipeRef.current = { active: true, selected: [idx], lastNodeIdx: idx };
    setSelectedIdxs([idx]);
    setFingerPos(local);
    setFlashState("idle");
    onSwipeMoveRef.current?.([chunks_[idx].chunk]);
    playTick?.(0);
  }, [toLocal, checkHit]);

  const handleTouchMove = useCallback((e) => {
    e.preventDefault();
    const s = swipeRef.current;
    if (!s.active) return;
    const touch   = e.touches[0];
    const local   = toLocal(touch);
    setFingerPos(local);
    const idx     = checkHit(local);
    const chunks_ = chunksRef.current;
    const done_   = completedRootsRef.current;
    if (idx !== -1 && idx !== s.lastNodeIdx && !s.selected.includes(idx) && !done_.includes(chunks_[idx].chunk)) {
      s.selected    = [...s.selected, idx];
      s.lastNodeIdx = idx;
      setSelectedIdxs([...s.selected]);
      onSwipeMoveRef.current?.(s.selected.map(i => chunks_[i].chunk));
      playTick?.(s.selected.length - 1);
    }
  }, [toLocal, checkHit]);

  const handleTouchEnd = useCallback((e) => {
    e.preventDefault();
    const s = swipeRef.current;
    if (!s.active) return;
    s.active = false;
    setFingerPos(null);
    if (s.selected.length < 2) {
      setSelectedIdxs([]);
      swipeRef.current.selected = [];
      onSwipeMoveRef.current?.([]);
      return;
    }
    const chunks_    = chunksRef.current;
    const swipedText = s.selected.map(i => chunks_[i].chunk).join("");
    const matched    = onSwipeCompleteRef.current(swipedText);
    if (matched) {
      setFlashState("success");
      onSwipeMoveRef.current?.([]);
      setTimeout(() => { setSelectedIdxs([]); setFlashState("idle"); swipeRef.current.selected = []; }, 500);
    } else {
      setFlashState("wrong");
      onSwipeWrongRef.current?.();
      playError?.();
      setTimeout(() => { setSelectedIdxs([]); setFlashState("idle"); swipeRef.current.selected = []; onSwipeMoveRef.current?.([]); }, 420);
    }
  }, []);

  const lineColor  = flashState === "success" ? "#66ff88" : flashState === "wrong" ? "#ff4455" : accentColor;
  const glowColor  = flashState === "success" ? "#00ff6688" : flashState === "wrong" ? "#ff000066" : accentColor + "55";
  const confirmedPoints = selectedIdxs.map(i => nodePositions[i]);
  const lastConfirmed   = confirmedPoints.length > 0 ? confirmedPoints[confirmedPoints.length - 1] : null;

  return (
    <div ref={containerRef}
      style={{ width:DIAL_SIZE, height:DIAL_SIZE, position:"relative", touchAction:"none", userSelect:"none" }}
      onTouchStart={handleTouchStart}
      onTouchMove={handleTouchMove}
      onTouchEnd={handleTouchEnd}
    >
      <svg style={{position:"absolute",inset:0,width:"100%",height:"100%",pointerEvents:"none"}} viewBox={`0 0 ${DIAL_SIZE} ${DIAL_SIZE}`}>
        <circle cx={CENTER} cy={CENTER} r={CENTER-4} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth="1.5"/>
        <circle cx={CENTER} cy={CENTER} r={DIAL_R-30} fill={`${worldColor}08`} stroke={`${worldColor}18`} strokeWidth="1"/>
        {chunks.map((_,i) => {
          const a = (i/chunks.length)*Math.PI*2 - Math.PI/2;
          return <line key={i}
            x1={CENTER+(DIAL_R-30)*Math.cos(a)} y1={CENTER+(DIAL_R-30)*Math.sin(a)}
            x2={CENTER+(DIAL_R+18)*Math.cos(a)} y2={CENTER+(DIAL_R+18)*Math.sin(a)}
            stroke="rgba(255,255,255,0.04)" strokeWidth="1"/>;
        })}
      </svg>

      <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",pointerEvents:"none"}}>
        <div style={{color:"rgba(255,255,255,0.15)",fontSize:"13.5px",letterSpacing:"0.75px",textAlign:"center",maxWidth:"120px",lineHeight:1.5}}>
          {selectedIdxs.length > 0 ? selectedIdxs.map(i => chunks[i].chunk).join(" + ") : meaning}
        </div>
      </div>

      {chunks.map((item,i) => {
        const {x,y}     = nodePositions[i];
        const isCompleted = completedRoots.includes(item.chunk);
        const isSelected  = selectedIdxs.includes(i);
        const orderNum    = isSelected ? selectedIdxs.indexOf(i)+1 : null;
        return (
          <div key={i} style={{
            position:"absolute", left:x-NODE_W/2, top:y-NODE_H/2, width:NODE_W, height:NODE_H,
            borderRadius:"12px",
            background: isCompleted
                ? `${worldColor}55`
                : isSelected
                ? `${accentColor}28`
                : item.fogHidden
                ? `${accentColor}10`
                : "rgba(255,255,255,0.09)",
            border: isCompleted
                ? `2px solid ${accentColor}cc`
                : isSelected
                ? `2px solid ${accentColor}`
                : item.fogHidden
                ? `1px dashed ${accentColor}60`
                : "1px solid rgba(255,255,255,0.18)",
            color: isCompleted ? accentColor : isSelected ? "#fff" : "rgba(255,255,255,0.88)",
            fontSize:"20px", fontWeight:"700", letterSpacing:"0.75px",
            display:"flex", alignItems:"center", justifyContent:"center",
            boxShadow: isSelected ? `0 0 18px ${accentColor}70` : isCompleted ? `0 0 12px ${accentColor}44` : "none",
            transform: isSelected ? "scale(1.12)" : "scale(1)",
            transition:"transform 0.15s ease,box-shadow 0.15s ease,background 0.15s ease,border 0.15s ease",
            pointerEvents:"auto", cursor:"default",
          }}>
            {isCompleted ? "✓" : item.chunk}
            {isSelected && !isCompleted && (
              <span style={{position:"absolute",top:-7,right:-7,width:24,height:24,borderRadius:"50%",
                background:accentColor,color:"#000",fontSize:"13px",fontWeight:"800",
                display:"flex",alignItems:"center",justifyContent:"center",
                boxShadow:`0 0 6px ${accentColor}`}}>{orderNum}</span>
            )}
          </div>
        );
      })}

      <svg style={{position:"absolute",inset:0,width:"100%",height:"100%",pointerEvents:"none",overflow:"visible"}} viewBox={`0 0 ${DIAL_SIZE} ${DIAL_SIZE}`}>
        <defs>
          <filter id="glow2">
            <feGaussianBlur stdDeviation="4" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        {confirmedPoints.length > 1 && <>
          <polyline points={confirmedPoints.map(p=>`${p.x},${p.y}`).join(" ")} fill="none" stroke={glowColor} strokeWidth={STROKE_GLOW} strokeLinecap="round" strokeLinejoin="round"/>
          <polyline points={confirmedPoints.map(p=>`${p.x},${p.y}`).join(" ")} fill="none" stroke={lineColor} strokeWidth={STROKE_CORE} strokeLinecap="round" strokeLinejoin="round" filter="url(#glow2)"/>
        </>}
        {lastConfirmed && fingerPos && <>
          <line x1={lastConfirmed.x} y1={lastConfirmed.y} x2={fingerPos.x} y2={fingerPos.y} stroke={glowColor} strokeWidth={STROKE_RB_GLW} strokeLinecap="round" strokeDasharray="6 5"/>
          <line x1={lastConfirmed.x} y1={lastConfirmed.y} x2={fingerPos.x} y2={fingerPos.y} stroke={lineColor} strokeWidth={STROKE_RB} strokeLinecap="round" strokeDasharray="6 5" opacity="0.85"/>
        </>}
        {confirmedPoints.map((p,i) => <circle key={i} cx={p.x} cy={p.y} r={5} fill={lineColor} filter="url(#glow2)"/>)}
        {fingerPos && <circle cx={fingerPos.x} cy={fingerPos.y} r={7} fill={lineColor} opacity="0.6"/>}
      </svg>
    </div>
  );
};

function EtymRoot() {
  const gameAudioRef = useRef(null);   // currently playing game-track element
  const gameAudioStartedRef = useRef(false);

  const [screen,          setScreen]          = useState("home");
  const [worldIdx,        setWorldIdx]        = useState(0);
  const [levelIdx,        setLevelIdx]        = useState(0);
  const [completedWorlds, setCompletedWorlds] = useState([]);
  const [unlockedWords,   setUnlockedWords]   = useState({});
  const [solvedWords,     setSolvedWords]     = useState(new Set());
  const [previewSlots,    setPreviewSlots]    = useState([]);
  const [showFact,        setShowFact]        = useState(false);
  const [pendingFacts,    setPendingFacts]    = useState([]);
  const [goldLeaves,      setGoldLeaves]      = useState(0);
  const { playTick, playSuccess, playError, playLevelComplete } = useSounds();
  const [definitionHints, setDefinitionHints] = useState(new Set());
  const [syllableHints,   setSyllableHints]   = useState(new Set());
  const [leafBurst,       setLeafBurst]       = useState(false);
  const [shake,           setShake]           = useState(false);
  const [score,           setScore]           = useState(0);
  const [timeLeft,        setTimeLeft]        = useState(60);
  const [timerActive,     setTimerActive]     = useState(false);
  const [chunks,          setChunks]          = useState([]);
  const [activeMilestone, setActiveMilestone] = useState(null);  // milestone to show, or null
  const [milestoneGlowWorld, setMilestoneGlowWorld] = useState(null); // world id whose branch should sparkle next time the tree is viewed

  // ── Quantum Leap state ────────────────────────────────────────────────────
  const [leapTarget,  setLeapTarget]  = useState(() => 4 + Math.floor(Math.random()*3)); // 2-4
  const [leapCount,   setLeapCount]   = useState(0);   // consecutive levels completed this run
  const [wormhole,    setWormhole]    = useState(false); // true while the transition plays
  const [wormholeTarget, setWormholeTarget] = useState(null); // the WORLDS entry being jumped to
  const [leapPhase, setLeapPhase] = useState(0); // 0=idle 1=collapse 2=shimmer 3=drift 4=expand
  const [entrySeq, setEntrySeq] = useState(0); // bumped on every world entry, forces level re-setup even if the resume level is unchanged
  const [seenIntros, setSeenIntros] = useState([]); // world ids whose title screen has already played once
  const timerRef = useRef(null);

  const world = WORLDS[worldIdx];
  const level = world?.levels[levelIdx];

  // Pick a background image based on progress through the world, for worlds
  // that provide a bgImages array (multiple images shown across the levels).
  // Falls back to the single bgImageUrl for worlds with only one image.
  const currentBgImage = useMemo(() => {
    if (!world) return null;
    if (!world.bgImages || world.bgImages.length <= 1) return world.bgImageUrl;
    const totalWords = world.levels.reduce((sum, lvl) => sum + lvl.words.length, 0);
    const wordsBeforeCurrentLevel = world.levels
      .slice(0, levelIdx)
      .reduce((sum, lvl) => sum + lvl.words.length, 0);
    const progressFraction = totalWords > 0 ? wordsBeforeCurrentLevel / totalWords : 0;
    const imageIndex = Math.min(
      world.bgImages.length - 1,
      Math.floor(progressFraction * world.bgImages.length)
    );
    return world.bgImages[imageIndex];
  }, [world, levelIdx]);

  const completedRoots = useMemo(() => {
    if (!level) return [];
    const usedInSolved      = new Set();
    const neededForUnsolved = new Set();
    level.words.forEach(w => {
      if (solvedWords.has(w.word)) w.roots.forEach(r => usedInSolved.add(r));
      else                         w.roots.forEach(r => neededForUnsolved.add(r));
    });
    const exhausted = [];
    usedInSolved.forEach(root => { if (!neededForUnsolved.has(root)) exhausted.push(root); });
    return exhausted;
  }, [level, solvedWords]);

  const buildChunks = useCallback((lvl, worldHasFog) => {
    const arr = lvl.chunks.map(c => ({ chunk: c, fogHidden: false }));
    // Fisher-Yates shuffle
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    // Fog of War: randomly hide 1–2 non-root letters visually as '?'
    // The underlying chunk value stays intact for swipe validation
    if (worldHasFog) {
      // Collect indices that are trap tiles (not needed for any word root)
      const allRoots = new Set(lvl.words.flatMap(w => w.roots));
      const trapIndices = arr.reduce((acc, item, idx) => {
        if (!allRoots.has(item.chunk)) acc.push(idx);
        return acc;
      }, []);
      // If not enough traps, also fog some root tiles
      const fogPool = trapIndices.length >= 2
        ? trapIndices
        : arr.map((_, idx) => idx);
      // Pick 1 or 2 random indices to fog
      const fogCount = Math.min(Math.floor(Math.random() * 2) + 1, fogPool.length);
      const shuffled = [...fogPool].sort(() => Math.random() - 0.5);
      shuffled.slice(0, fogCount).forEach(idx => { arr[idx].fogHidden = true; });
    }
    return arr;
  }, []);

  // ── Audio crossfade helper: smoothly ramp an <audio> element's volume ──────
  const fadeAudio = (el, toVolume, durationMs, onComplete) => {
    if (!el) { if (onComplete) onComplete(); return; }
    // Fade generation token: if a newer fade is requested on this element before
    // an older one finishes, the older one's ticks detect the mismatch and stop
    // themselves rather than continuing to write stale volume values — this is
    // what was causing two tracks to play simultaneously during rapid transitions.
    const myGen = (el._fadeGen = (el._fadeGen || 0) + 1);
    const fromVolume = el.volume;
    const steps = 24;
    const stepMs = durationMs / steps;
    let i = 0;
    const tick = () => {
      if (el._fadeGen !== myGen) return; // superseded by a newer fade — stop
      i++;
      const t = i / steps;
      // Ease in the direction we're heading (exponential-feeling curve)
      const eased = fromVolume + (toVolume - fromVolume) * (1 - Math.pow(1 - t, 2));
      el.volume = Math.max(0, Math.min(1, eased));
      if (i < steps) {
        setTimeout(tick, stepMs);
      } else {
        el.volume = toVolume;
        if (toVolume === 0) el.pause();
        if (onComplete) onComplete();
      }
    };
    tick();
  };

  useEffect(() => {
    if (level) {
      setChunks(buildChunks(level, world?.hasFog ?? false));
      setSolvedWords(new Set());
      setPreviewSlots([]);

      // ── Game background music: switch track when world changes, with a fade ──
      // Skip this while a wormhole leap is actively transitioning — triggerWormhole
      // already owns the fade-out/fade-in for that case, and running both here and
      // there at once was causing two tracks to overlap and play simultaneously.
      if (!wormhole) {
        const desiredEl = world?.id ? document.getElementById("game-audio-" + world.id) : null;
        if (gameAudioRef.current !== desiredEl) {
          const previousEl = gameAudioRef.current;
          gameAudioRef.current = desiredEl;
          if (desiredEl) {
            desiredEl.volume = 0;
            desiredEl.play().catch((e) => console.warn("game audio:", world.id, e.message));
            fadeAudio(desiredEl, 0.22, 700);
          }
          // Fade out and stop the previous world's track rather than cutting it
          if (previousEl && previousEl !== desiredEl) {
            fadeAudio(previousEl, 0, 500);
          }
        }
      } else {
        // Still keep gameAudioRef pointed at the right element so future,
        // non-wormhole level changes have an accurate "previous track" to fade from.
        const desiredEl = world?.id ? document.getElementById("game-audio-" + world.id) : null;
        gameAudioRef.current = desiredEl;
      }
      setShowFact(false);
      setPendingFacts([]);
      setDefinitionHints(new Set());
      setSyllableHints(new Set());
      setTimeLeft(60);
      setShake(false);
      setActiveMilestone(null);
    }
  }, [worldIdx, levelIdx, level, buildChunks, entrySeq, wormhole]);

  useEffect(() => {
    if (screen === "game") setTimerActive(true);
    else setTimerActive(false);

    // Pause ALL audio whenever we land on a screen that isn't actively playing
    // world music (home, tree, worldComplete, etc.) — this covers both the
    // tracked game-track element AND any intro-track element that may have
    // been started independently by WorldIntroScreen, which gameAudioRef never
    // knew about. Leaving that one untouched was letting title-screen music
    // keep playing after Home, then layering under whatever played next.
    if (screen !== "game" && screen !== "worldIntro") {
      document.querySelectorAll('audio[id^="intro-audio-"], audio[id^="game-audio-"]').forEach(el => {
        if (!el.paused) el.pause();
      });
    } else if (screen === "game" && gameAudioRef.current && gameAudioRef.current.paused) {
      gameAudioRef.current.play().catch(() => {});
    }
  }, [screen]);

  useEffect(() => {
    if (timerActive && timeLeft > 0) {
      timerRef.current = setTimeout(() => setTimeLeft(t => t - 1), 1000);
    } else if (timeLeft === 0 && timerActive) {
      setTimerActive(false);
      setShake(true);
      setTimeout(() => setShake(false), 500);
    }
    return () => clearTimeout(timerRef.current);
  }, [timerActive, timeLeft]);

  const handleSwipeComplete = useCallback((swipedText) => {
    if (!level || showFact) return false;
    const match = level.words.find(w => w.roots.join("") === swipedText);
    if (!match || solvedWords.has(match.word)) return false;

    const newSolved = new Set(solvedWords);
    newSolved.add(match.word);
    setSolvedWords(newSolved);
    playSuccess();
    setPendingFacts(prev => [...prev, { word: match.word, fact: match.fact }]);
    setScore(prev => prev + Math.max(10, timeLeft));
    setGoldLeaves(prev => prev + 10);
    setLeafBurst(true);
    setTimeout(() => setLeafBurst(false), 600);

    const allDone = level.words.every(w => newSolved.has(w.word));
    if (allDone) {
      setTimerActive(false);
      playLevelComplete();
      // Check if this level is a milestone boundary
      const milestones = world?.milestones || [];
      const hitMilestone = milestones.find(m => m.afterLevel === levelIdx + 1);
      if (hitMilestone) {
        setActiveMilestone(hitMilestone);
        setMilestoneGlowWorld(world.id);
      } else {
        setShowFact(true);
      }
      setUnlockedWords(prev => {
        const updated = { ...prev };
        if (!updated[world.id]) updated[world.id] = [];
        level.words.forEach(w => { if (!updated[world.id].includes(w.word)) updated[world.id].push(w.word); });
        return updated;
      });
    }
    return true;
  }, [level, showFact, solvedWords, timeLeft, world]);

  const handleSwipeWrong = useCallback(() => {
    setShake(true);
    setTimeout(() => setShake(false), 500);
  }, []);

  const handleDefinitionHint = useCallback((wordStr) => {
    if (goldLeaves < 50) return;
    setGoldLeaves(prev => prev - 50);
    setDefinitionHints(prev => new Set([...prev, wordStr]));
  }, [goldLeaves]);

  const handleSyllableHint = useCallback((wordStr) => {
    if (goldLeaves < 100) return;
    setGoldLeaves(prev => prev - 100);
    setSyllableHints(prev => new Set([...prev, wordStr]));
  }, [goldLeaves]);

  // ── Wormhole transition: jump to a new world after the leap target is hit ──

  // ── Quantum Leap transition: Linguistic Horizon Collapse & Glyph Drift ─────
  // Phase 1 (0.8s): container collapses to a line, blur builds, music fades out
  // Phase 2 (0.6s): horizon shimmers — ALL DOM/world swapping happens here, hidden
  // Phase 3 (1.0s): glyphs drift across the collapsed horizon, old→new colour
  // Phase 4 (0.8s): line bursts open, blur clears, new world's music fades in
    // ── Quantum Leap transition: a single premium flash, not a sequence of effects ──
  // Beat 1 (0.7s): the current scene dims and softens, music fades out
  // Beat 2 (0.4s): one clean radial flash in the destination's colour — every
  //                bit of world/level swapping happens at the instant of peak light
  // Beat 3 (0.9s): the flash settles away as the new world's music fades in
    // ── Quantum Leap transition: the current world dissolves into the next ─────
  // Phase 1 (0.55s): outgoing tiles begin breaking apart + drifting, accent
  //                  veil rises, music fades out — the world losing cohesion
  // Phase 2 (~1.0s): DOM swap happens immediately, incoming tiles reconstitute
  //                  on their own staggered settle, new music fades in
  const triggerWormhole = (nextWorld) => {
    console.log("Quantum Leap → " + nextWorld.id);
    setWormholeTarget(nextWorld);
    setWormhole(true);
    setLeapPhase(1);

    const outgoingEl = gameAudioRef.current || document.getElementById("intro-audio-" + world.id);
    fadeAudio(outgoingEl, 0, 550);

    // Phase 1 → Phase 2 (550ms) — the outgoing tiles have begun dissolving;
    // swap the world now so the incoming tiles reconstitute the correct art
    setTimeout(() => {
      const nextIdx = WORLDS.findIndex(w => w.id === nextWorld.id);
      setWorldIdx(nextIdx);
      setLevelIdx(0);
      setEntrySeq(prev => prev + 1);

      // Wormhole leaps always drop straight into gameplay — title screens are
      // reserved exclusively for deliberate world selection from the home menu.
      setSeenIntros(prev => prev.includes(nextWorld.id) ? prev : [...prev, nextWorld.id]);
      setScreen("game");

      setLeapPhase(2);

      const incomingEl = document.getElementById("intro-audio-" + nextWorld.id)
                        || document.getElementById("game-audio-" + nextWorld.id);
      if (incomingEl) {
        incomingEl.volume = 0;
        incomingEl.play().catch(() => {});
        fadeAudio(incomingEl, 0.45, 850);
      }

      // Phase 2 fully resolves — tiles have settled, clear the overlay (1050ms,
      // covers the longest staggered tile: 0.25 + 0.45 delay + 0.75 transition)
      setTimeout(() => {
        setWormhole(false);
        setWormholeTarget(null);
        setLeapPhase(0);
      }, 1050);
    }, 550);
  };

  const handleNext = () => {
    const isLast = levelIdx >= world.levels.length - 1;
    console.log("handleNext: leapCount=" + leapCount + " leapTarget=" + leapTarget + " isLast=" + isLast);

    // Mark world fully complete regardless of leap state
    if (isLast) {
      setCompletedWorlds(prev => prev.includes(world.id) ? prev : [...prev, world.id]);
    }

    const newLeapCount = leapCount + 1;

    // ── Quantum Leap check: have we hit the random target for this run? ─────
    if (newLeapCount >= leapTarget && !isLast) {
      const nextWorld = pickRandomWorld(world.id);
      console.log("Leap target hit — next world:", nextWorld ? nextWorld.id : "NONE AVAILABLE");
      setLeapCount(0);
      setLeapTarget(4 + Math.floor(Math.random()*3));
      if (nextWorld) {
        triggerWormhole(nextWorld);
      } else {
        setLevelIdx(prev => prev + 1);
      }
      return;
    }

    if (isLast) {
      const nextWorld = pickRandomWorld(world.id);
      console.log("World finished — next world:", nextWorld ? nextWorld.id : "NONE AVAILABLE, showing worldComplete");
      setLeapCount(0);
      setLeapTarget(4 + Math.floor(Math.random()*3));
      if (nextWorld) {
        triggerWormhole(nextWorld);
      } else {
        setScreen("worldComplete");
      }
      return;
    }

    // Normal case — no leap yet, just advance to the next level in this world
    setLeapCount(newLeapCount);
    setLevelIdx(prev => prev + 1);
  };

  // Progress helper: how many words solved vs total for any world
  const worldProgress = (w) => {
    const total = w.levels.reduce((sum, lvl) => sum + lvl.words.length, 0);
    const solved = (unlockedWords[w.id] || []).length;
    return { solved, total };
  };

  // Find the level to resume at: the first level containing a word the
  // player hasn't solved yet in this world. Falls back to level 0 if the
  // player hasn't started, or the last level if everything is complete.
  const resumeLevelIndex = (w) => {
    const solvedSet = new Set(unlockedWords[w.id] || []);
    for (let i = 0; i < w.levels.length; i++) {
      const allSolvedInLevel = w.levels[i].words.every(word => solvedSet.has(word.word));
      if (!allSolvedInLevel) return i;
    }
    return Math.max(0, w.levels.length - 1); // fully complete — land on the last level
  };

  // Pick a random incomplete world (excludes the one currently being played, if possible)
  const pickRandomWorld = (excludeId) => {
    const candidates = WORLDS.filter(w => !completedWorlds.includes(w.id) && w.id !== excludeId);
    const pool = candidates.length > 0
      ? candidates
      : WORLDS.filter(w => !completedWorlds.includes(w.id)); // fall back if only current world left
    if (pool.length === 0) return null; // all worlds mastered
    return pool[Math.floor(Math.random() * pool.length)];
  };

  const startGame = (wIdx = 0, forcedLevelIdx = null) => {
    const selectedWorld = WORLDS[wIdx];
    // Resume where the player left off unless a specific level was requested
    // (e.g. replaying a world from scratch, or the +1 "next world" button).
    const resumeIdx = forcedLevelIdx !== null ? forcedLevelIdx : resumeLevelIndex(selectedWorld);
    setWorldIdx(wIdx);
    setLevelIdx(resumeIdx);
    setEntrySeq(prev => prev + 1); // ensure level setup re-runs even on a repeat visit
    // A fresh manual selection from the menu starts a new leap run
    setLeapCount(0);
    setLeapTarget(4 + Math.floor(Math.random()*3));
    // Show the title screen only the first time this world is ever entered —
    // whether that first visit came from the home menu or an earlier wormhole
    // leap. Once seen, returning to a world (including to resume progress)
    // skips straight into gameplay at the resume point.
    const hasIntro = !!(selectedWorld?.intro || selectedWorld?.historicalSummary);
    const alreadySeen = seenIntros.includes(selectedWorld.id);
    if (hasIntro && !alreadySeen) {
      setSeenIntros(prev => prev.includes(selectedWorld.id) ? prev : [...prev, selectedWorld.id]);
      setScreen("worldIntro");
    } else {
      setScreen("game");
    }
  };

  const timerPct   = timeLeft / 60;
  const timerColor = timeLeft > 30 ? "#8de87a" : timeLeft > 15 ? "#f5c030" : "#e87a6d";
  const circ       = 2 * Math.PI * 20;

  if (screen === "tree") return <LanguageTree completedWorlds={completedWorlds} unlockedWords={unlockedWords} milestoneGlowWorld={milestoneGlowWorld} onGlowShown={() => setMilestoneGlowWorld(null)} onClose={() => setScreen("home")}/>;

  if (activeMilestone) {
    return (
      <MilestoneScreen
        milestone={activeMilestone}
        world={world}
        onContinue={() => {
          setActiveMilestone(null);
          setShowFact(true);
        }}
      />
    );
  }

  if (wormhole) {
    const dest = wormholeTarget;
    const fromImg = world?.bgImageUrl || "";
    const toImg   = dest?.bgImageUrl || "";
    const accent  = dest?.accentColor || "#fff";
    // Two beats only:
    // 1 = dissolving — the current world's tiles fade out + drift, the
    //     destination's tiles fade in + settle, fully overlapping
    // 2 = resolved — dissolve fully complete, tiles gone, real screen underneath
    const dissolving = leapPhase === 1 || leapPhase === 2;
    const cols = 12, rows = 9; // 108 tiles — fine enough to read as dissolving, light enough to stay smooth

    // Precompute each tile's stagger + drift once per leap (stable across re-renders
    // within the same wormhole instance since wormholeTarget only changes per-leap)
    const tiles = [];
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        // Pseudo-random but deterministic per tile index, so it doesn't reshuffle on re-render
        const seed = (r * cols + c) * 137.5;
        const rand = (n) => Math.abs(Math.sin(seed + n)) % 1;
        tiles.push({
          r, c,
          delay: rand(1) * 0.45,                       // 0–0.45s stagger
          driftX: (rand(2) - 0.5) * 30,                 // drift up to ±15px
          driftY: (rand(3) - 0.5) * 30,
          rot: (rand(4) - 0.5) * 6,                      // slight tilt up to ±3deg
        });
      }
    }

    return (
      <div style={{position:"fixed", inset:0, zIndex:198, overflow:"hidden", pointerEvents:"none"}}>
        {/* Outgoing tile grid — the CURRENT world's art, breaking apart */}
        {fromImg && tiles.map((t,i) => (
          <div key={`out${i}`} style={{
            position:"absolute",
            left:`${(t.c/cols)*100}%`, top:`${(t.r/rows)*100}%`,
            width:`${100/cols}%`, height:`${100/rows}%`,
            backgroundImage:`url(${fromImg})`,
            backgroundSize:`${cols*100}% ${rows*100}%`,
            backgroundPosition:`${(t.c/(cols-1))*100}% ${(t.r/(rows-1))*100}%`,
            opacity: dissolving ? 0 : 0,
            transform: dissolving
              ? `translate(${t.driftX}px,${t.driftY}px) rotate(${t.rot}deg) scale(0.94)`
              : "translate(0,0) rotate(0) scale(1)",
            transition: `opacity 0.55s ease-in ${t.delay}s, transform 0.7s cubic-bezier(0.4,0,0.6,1) ${t.delay}s`,
          }}/>
        ))}

        {/* Incoming tile grid — the DESTINATION world's art, reconstituting */}
        {toImg && tiles.map((t,i) => (
          <div key={`in${i}`} style={{
            position:"absolute",
            left:`${(t.c/cols)*100}%`, top:`${(t.r/rows)*100}%`,
            width:`${100/cols}%`, height:`${100/rows}%`,
            backgroundImage:`url(${toImg})`,
            backgroundSize:`${cols*100}% ${rows*100}%`,
            backgroundPosition:`${(t.c/(cols-1))*100}% ${(t.r/(rows-1))*100}%`,
            opacity: leapPhase === 2 ? 1 : 0,
            transform: leapPhase === 2
              ? "translate(0,0) rotate(0) scale(1)"
              : `translate(${-t.driftX}px,${-t.driftY}px) rotate(${-t.rot}deg) scale(1.05)`,
            transition: `opacity 0.6s ease-out ${0.25+t.delay}s, transform 0.75s cubic-bezier(0.16,1,0.3,1) ${0.25+t.delay}s`,
          }}/>
        ))}

        {/* A whisper-thin veil of the destination's accent colour, present only
            at the densest moment of the dissolve, to unify the two breaking
            images into a single coherent in-between moment rather than two
            unrelated photos overlapping */}
        <div style={{
          position:"absolute", inset:0,
          background: accent,
          opacity: leapPhase === 1 ? 0.16 : 0,
          transition: "opacity 0.5s ease",
        }}/>

        {/* Destination name, appearing softly once the new tiles are mostly settled */}
        <div style={{
          position:"absolute", left:0, right:0, bottom:"14%",
          textAlign:"center",
          opacity: leapPhase === 2 ? 1 : 0,
          transition: "opacity 0.6s ease 0.5s",
        }}>
          <div style={{
            fontFamily:"Georgia,serif", fontSize:"11px", letterSpacing:"6px",
            color:"#fff", textTransform:"uppercase",
            textShadow:`0 0 16px ${accent}, 0 2px 8px rgba(0,0,0,0.8)`,
          }}>
            {dest?.emoji}&nbsp;&nbsp;{dest?.name}
          </div>
        </div>
      </div>
    );
  }

  if (screen === "worldIntro" && (world?.intro || world?.historicalSummary)) {
    return (
      <WorldIntroScreen
        world={world}
        onBegin={() => { setLevelIdx(0); setScreen("game"); }}
        onBack={() => setScreen("home")}
      />
    );
  }


  if (screen === "worldComplete") {
    const nextWorld = WORLDS[worldIdx + 1];
    return (
      <div style={{minHeight:"100svh",background:world.bgGradient,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",fontFamily:"Georgia,serif",padding:"30px 20px",textAlign:"center"}}>
        <div style={{fontSize:"60px",marginBottom:"16px"}}>🌳</div>
        <div style={{color:world.accentColor,fontSize:"12px",letterSpacing:"3px",textTransform:"uppercase",marginBottom:"8px"}}>World Complete</div>
        <div style={{color:"#fff",fontSize:"28px",fontWeight:"700",marginBottom:"8px"}}>{world.name}</div>
        <div style={{color:"rgba(255,255,255,0.6)",fontSize:"14px",marginBottom:"28px"}}>A new branch grew on your Language Tree!</div>
        <div style={{background:"rgba(255,255,255,0.08)",border:`1px solid ${world.accentColor}30`,borderRadius:"16px",padding:"16px 24px",marginBottom:"24px",width:"100%",maxWidth:"280px"}}>
          <div style={{color:world.accentColor,fontSize:"11px",letterSpacing:"2px",marginBottom:"8px"}}>WORDS UNLOCKED</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:"8px",justifyContent:"center"}}>
            {(unlockedWords[world.id]||[]).map((w,i)=><span key={i} style={{background:`${world.accentColor}20`,border:`1px solid ${world.accentColor}50`,color:world.accentColor,borderRadius:"20px",padding:"4px 12px",fontSize:"13px",fontWeight:"600"}}>{w}</span>)}
          </div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:"10px",width:"100%",maxWidth:"280px"}}>
          {nextWorld&&<button onClick={()=>startGame(worldIdx+1)} style={{background:nextWorld.color,border:"none",borderRadius:"14px",padding:"16px",color:"#fff",fontSize:"16px",fontWeight:"700",cursor:"pointer"}}>{nextWorld.emoji} Start {nextWorld.name}</button>}
          <button onClick={()=>setScreen("tree")} style={{background:"transparent",border:`1px solid ${world.accentColor}50`,borderRadius:"14px",padding:"14px",color:world.accentColor,fontSize:"14px",fontWeight:"600",cursor:"pointer"}}>🌳 View Language Tree</button>
          <button onClick={()=>setScreen("home")} style={{background:"transparent",border:"none",color:"rgba(255,255,255,0.4)",fontSize:"13px",cursor:"pointer",padding:"8px"}}>Back to Home</button>
        </div>
      </div>
    );
  }

  if (screen === "home") {
    return (
      <div style={{minHeight:"100svh",background:"linear-gradient(180deg,#0a0f1a 0%,#0d180e 60%,#0a1208 100%)",display:"flex",flexDirection:"column",alignItems:"center",fontFamily:"Georgia,serif",padding:"0 20px 40px",overflowY:"auto"}}>
        <div style={{paddingTop:"50px",textAlign:"center",marginBottom:"8px"}}>
          <div style={{fontSize:"52px",marginBottom:"12px"}}>🌳</div>
          <div style={{color:"#8de87a",fontSize:"11px",letterSpacing:"4px",textTransform:"uppercase",marginBottom:"6px"}}>Etymology Quest</div>
          <div style={{color:"#fff",fontSize:"32px",fontWeight:"700",lineHeight:1.2,marginBottom:"6px"}}>EtymRoot</div>
          <div style={{color:"rgba(255,255,255,0.45)",fontSize:"13px",lineHeight:1.6,maxWidth:"260px",margin:"0 auto 22px"}}>
            Swipe across roots to build English words — and discover where they truly come from.
          </div>
        </div>
        <div style={{width:"100%",maxWidth:"340px",marginBottom:"22px"}}>
          <svg viewBox="0 0 340 92" xmlns="http://www.w3.org/2000/svg" style={{width:"100%",height:"auto",display:"block"}}>
            <defs>
              <linearGradient id="scriptBandBg" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stopColor="#ffffff" stopOpacity="0.05"/>
                <stop offset="100%" stopColor="#ffffff" stopOpacity="0.02"/>
              </linearGradient>
            </defs>
            <rect x="0" y="0" width="340" height="92" rx="16" fill="url(#scriptBandBg)" stroke="rgba(255,255,255,0.08)" strokeWidth="1"/>
            {/* Five script samples, one per remaining world, evenly spaced */}
            {/* Arabic — 'qahwa' (coffee root) in Arabic script */}
            <text x="38" y="40" textAnchor="middle" fill="#e8b86d" fontSize="22" fontFamily="serif" opacity="0.92">قهوة</text>
            <text x="38" y="58" textAnchor="middle" fill="rgba(255,255,255,0.4)" fontSize="8" letterSpacing="0.5" fontFamily="Georgia,serif">ARABIC</text>
            {/* Greek — 'logos' (word/study root) in Greek script */}
            <text x="108" y="38" textAnchor="middle" fill="#81E6D9" fontSize="20" fontFamily="serif" opacity="0.92">λόγος</text>
            <text x="108" y="58" textAnchor="middle" fill="rgba(255,255,255,0.4)" fontSize="8" letterSpacing="0.5" fontFamily="Georgia,serif">GREEK</text>
            {/* Celtic — Ogham strokes spelling a short root, stylised */}
            <g transform="translate(170,30)" opacity="0.92">
              <line x1="0" y1="-12" x2="0" y2="14" stroke="#BEE3F8" strokeWidth="2"/>
              <line x1="-5" y1="-9" x2="0" y2="-9" stroke="#BEE3F8" strokeWidth="2"/>
              <line x1="-5" y1="-3" x2="0" y2="-3" stroke="#BEE3F8" strokeWidth="2"/>
              <line x1="0" y1="3" x2="5" y2="3" stroke="#BEE3F8" strokeWidth="2"/>
              <line x1="0" y1="9" x2="5" y2="9" stroke="#BEE3F8" strokeWidth="2"/>
            </g>
            <text x="170" y="58" textAnchor="middle" fill="rgba(255,255,255,0.4)" fontSize="8" letterSpacing="0.5" fontFamily="Georgia,serif">CELTIC</text>
            {/* Anglo-Saxon — Old English / Futhorc-style lettering for a root word */}
            <text x="240" y="38" textAnchor="middle" fill="#E2E8F0" fontSize="17" fontFamily="serif" opacity="0.92" style={{fontStyle:"italic"}}>ᚹᚢᚱᛞ</text>
            <text x="240" y="58" textAnchor="middle" fill="rgba(255,255,255,0.4)" fontSize="8" letterSpacing="0.5" fontFamily="Georgia,serif">ANGLO-SAXON</text>
            {/* Norman French — 'chevalier' fragment in elegant script */}
            <text x="305" y="38" textAnchor="middle" fill="#FBB6CE" fontSize="15" fontFamily="Georgia,serif" fontStyle="italic" opacity="0.92">chevalier</text>
            <text x="305" y="58" textAnchor="middle" fill="rgba(255,255,255,0.4)" fontSize="8" letterSpacing="0.5" fontFamily="Georgia,serif">FRENCH</text>
            {/* Subtle connecting line beneath, like a thread of language history */}
            <line x1="14" y1="70" x2="326" y2="70" stroke="rgba(255,255,255,0.08)" strokeWidth="1" strokeDasharray="2,3"/>
            <text x="170" y="84" textAnchor="middle" fill="rgba(255,255,255,0.3)" fontSize="8.5" letterSpacing="1.5" fontFamily="Georgia,serif">FIVE LANGUAGES · ONE ENGLISH TONGUE</text>
          </svg>
        </div>
        {score>0&&<div style={{background:"rgba(141,232,122,0.1)",border:"1px solid #8de87a30",borderRadius:"12px",padding:"10px 20px",marginBottom:"20px",color:"#8de87a",fontSize:"13px"}}>⭐ Your Score: <strong>{score}</strong></div>}
        <div style={{width:"100%",maxWidth:"340px",display:"flex",flexDirection:"column",gap:"12px",marginBottom:"20px"}}>
          {WORLDS.map((w,i)=>{
            const done=completedWorlds.includes(w.id);
            const unlocked=true;
            const {solved,total}=worldProgress(w);
            const pct=total>0?Math.round((solved/total)*100):0;
            return <button key={w.id} onClick={()=>unlocked&&startGame(i)} style={{background:done?`${w.color}22`:unlocked?"rgba(255,255,255,0.06)":"rgba(255,255,255,0.02)",border:`1px solid ${done?w.color+"60":unlocked?"rgba(255,255,255,0.12)":"rgba(255,255,255,0.04)"}`,borderRadius:"16px",padding:"16px 18px",cursor:unlocked?"pointer":"default",display:"flex",alignItems:"center",gap:"14px",width:"100%",textAlign:"left"}}>
              <div style={{width:"44px",height:"44px",borderRadius:"12px",background:`${w.color}30`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"22px",flexShrink:0}}>{unlocked?w.emoji:"🔒"}</div>
              <div style={{flex:1}}>
                <div style={{display:"flex",alignItems:"center",gap:"6px",marginBottom:"4px"}}>
                  <div style={{color:unlocked?"#fff":"#444",fontSize:"14px",fontWeight:"700"}}>{w.name}</div>
                  {done&&<span style={{color:w.color,fontSize:"9px",fontWeight:"800",letterSpacing:"0.5px",background:`${w.color}30`,border:`1px solid ${w.color}60`,borderRadius:"6px",padding:"2px 6px"}}>MASTERED</span>}
                </div>
                <div style={{color:unlocked?"rgba(255,255,255,0.4)":"#333",fontSize:"11px",marginBottom:"6px"}}>{solved}/{total} Solved</div>
                <div style={{width:"100%",height:"5px",borderRadius:"3px",background:"rgba(255,255,255,0.08)",overflow:"hidden"}}>
                  <div style={{width:`${pct}%`,height:"100%",background:done?w.color:`${w.color}aa`,borderRadius:"3px",transition:"width 0.4s ease"}}/>
                </div>
              </div>
              {done&&<span style={{color:w.color,fontSize:"18px"}}>✓</span>}
            </button>;
          })}
        </div>
        <button onClick={()=>setScreen("tree")} style={{background:"transparent",border:"1px solid #8de87a40",borderRadius:"14px",padding:"14px 28px",color:"#8de87a",fontSize:"14px",fontWeight:"600",cursor:"pointer"}}>🌳 Language Tree {completedWorlds.length>0&&`(${Object.values(unlockedWords).flat().length} words)`}</button>
      </div>
    );
  }

  // ── Game Screen ──────────────────────────────────────────────────────────────
  // Layout: fixed header, compact chips row, then remaining space = dial centred
  return (
    <div style={{
      height:"100svh",
      display:"flex", flexDirection:"column",
      overflow:"hidden", fontFamily:"Georgia,serif",
      position:"relative", userSelect:"none",
      backgroundImage: currentBgImage
        ? `url(${currentBgImage})`
        : world.bgGradient,
      backgroundSize: "cover",
      backgroundPosition: "center top",
    }}>
      {/* Dark gradient overlay for text readability */}
      <div style={{
        position:"absolute", inset:0, zIndex:1,
        background: "linear-gradient(180deg, rgba(0,0,0,0.72) 0%, rgba(0,0,0,0.55) 40%, rgba(0,0,0,0.78) 100%)",
        pointerEvents:"none",
      }}/>
      {/* Full-screen background art */}


      {/* ── Header ── */}
      <div style={{display:"flex",alignItems:"center",padding:"14px 16px 8px",position:"relative",zIndex:2,flexShrink:0}}>
        <button onClick={()=>setScreen("home")} style={{background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.12)",color:"#fff",borderRadius:"10px",padding:"6px 12px",fontSize:"13px",cursor:"pointer"}}>← Home</button>
        <div style={{flex:1,textAlign:"center"}}>
          <div style={{color:world.accentColor,fontSize:"10px",letterSpacing:"2px",textTransform:"uppercase"}}>{world.emoji} {world.name.split(" ").slice(-1)[0]}</div>
          <div style={{color:"rgba(255,255,255,0.5)",fontSize:"11px"}}>Level {levelIdx+1} / {world.levels.length}</div>
        </div>
        <button onClick={()=>setScreen("tree")} style={{background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.12)",color:"#fff",borderRadius:"10px",padding:"6px 12px",fontSize:"13px",cursor:"pointer"}}>🌳</button>
      </div>

      {/* ── Status bar: Leaves · Timer · Words ── */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 16px 8px",position:"relative",zIndex:2,flexShrink:0}}>
        <div style={{
          display:"flex",alignItems:"center",gap:"5px",
          background: leafBurst?"rgba(255,215,0,0.18)":"rgba(255,255,255,0.06)",
          border:`1px solid ${leafBurst?"rgba(255,215,0,0.5)":"rgba(255,255,255,0.12)"}`,
          borderRadius:"20px",padding:"4px 10px",transition:"all 0.3s ease",
        }}>
          <span style={{fontSize:"14px"}}>🍂</span>
          <span style={{color:leafBurst?"#ffd700":"#e8b86d",fontSize:"13px",fontWeight:"700",transition:"color 0.3s"}}>{goldLeaves}</span>
        </div>
        <svg width="44" height="44" viewBox="0 0 48 48">
          <circle cx="24" cy="24" r="20" fill="none" stroke="rgba(255,255,255,0.1)" strokeWidth="3"/>
          <circle cx="24" cy="24" r="20" fill="none" stroke={timerColor} strokeWidth="3" strokeLinecap="round"
            strokeDasharray={circ} strokeDashoffset={circ*(1-timerPct)}
            transform="rotate(-90 24 24)" style={{transition:"stroke-dashoffset 1s linear,stroke 0.5s"}}/>
          <text x="24" y="28" textAnchor="middle" fill={timerColor} fontSize="12" fontWeight="700">{timeLeft}</text>
        </svg>
        <div style={{color:"rgba(255,255,255,0.5)",fontSize:"12px",textAlign:"right"}}>
          <div>{solvedWords.size}/{level?.words.length}</div>
          <div style={{fontSize:"10px",color:"rgba(255,255,255,0.3)"}}>words</div>
        </div>
      </div>

      {/* ── Level clue ── */}
      <div style={{
        margin:"0 14px 8px",padding:"7px 12px",
        background:"rgba(255,255,255,0.05)",border:`1px solid ${world.accentColor}30`,
        borderRadius:"12px",position:"relative",zIndex:2,
        display:"flex",alignItems:"center",gap:"8px",flexShrink:0,
      }}>
        <span style={{fontSize:"13px"}}>🔍</span>
        <div style={{flex:1,color:"rgba(255,255,255,0.65)",fontSize:"16.5px",lineHeight:1.4,fontStyle:"italic"}}>
          {level?.clue}
        </div>
      </div>

      {/* ── Word Chips Row — compact horizontal scroll ── */}
      {!showFact && (
        <div style={{flexShrink:0, marginBottom:"6px", position:"relative", zIndex:2}}>
          <WordChipsRow
            words={level?.words || []}
            solvedWords={solvedWords}
            previewSlots={previewSlots}
            syllableHints={syllableHints}
            definitionHints={definitionHints}
            goldLeaves={goldLeaves}
            worldColor={world.color}
            accentColor={world.accentColor}
            onDefinitionHint={handleDefinitionHint}
            onSyllableHint={handleSyllableHint}
            shake={shake}
          />
        </div>
      )}

      {/* ── Fun Facts panel (replaces dial area when level complete) ── */}
      {showFact && (
        <div style={{
          flex:1, margin:"0 14px", overflow:"hidden",
          background:`${world.color}18`, border:`1px solid ${world.accentColor}40`,
          borderRadius:"14px", padding:"12px 14px",
          position:"relative", zIndex:2,
          display:"flex", flexDirection:"column",
        }}>
          <div style={{color:world.accentColor,fontSize:"11px",letterSpacing:"2px",marginBottom:"8px",flexShrink:0}}>✨ DID YOU KNOW?</div>
          <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:"10px"}}>
            {pendingFacts.map((f,i) => (
              <div key={i}>
                <div style={{color:"#fff",fontSize:"16.5px",fontWeight:"700",marginBottom:"3px",letterSpacing:"1px"}}>{f.word}</div>
                <div style={{color:"rgba(255,255,255,0.75)",fontSize:"16.5px",lineHeight:1.6}}>{f.fact}</div>
              </div>
            ))}
          </div>
          <div style={{marginTop:"12px",display:"flex",justifyContent:"center",flexShrink:0}}>
            <button onClick={handleNext} style={{background:world.color,border:"none",borderRadius:"12px",padding:"12px 32px",color:"#fff",fontSize:"14px",fontWeight:"700",cursor:"pointer",boxShadow:`0 4px 18px ${world.color}60`}}>
              {levelIdx>=world.levels.length-1?"Complete World 🌳":"Next Level →"}
            </button>
          </div>
        </div>
      )}

      {/* ── Swipe Dial — takes all remaining flex space, centred ── */}
      {!showFact && (
        <div style={{
          flex:1, display:"flex", flexDirection:"column",
          alignItems:"center", justifyContent:"center",
          position:"relative", zIndex:2,
          paddingBottom:"8px",
        }}>
          <div style={{color:"rgba(255,255,255,0.25)",fontSize:"10px",letterSpacing:"2px",marginBottom:"8px",textTransform:"uppercase"}}>
            Swipe across the roots
          </div>
          <SwipeDial
            key={`${worldIdx}-${levelIdx}`}
            chunks={chunks}
            completedRoots={completedRoots}
            accentColor={world.accentColor}
            worldColor={world.color}
            onSwipeComplete={handleSwipeComplete}
            onSwipeWrong={handleSwipeWrong}
            onSwipeMove={setPreviewSlots}
            meaning={level?.clue}
            playTick={playTick}
            playError={playError}
          />
        </div>
      )}

      <style>{`
        @keyframes shake {
          0%,100%{transform:translateX(0)}
          20%{transform:translateX(-8px)}
          40%{transform:translateX(8px)}
          60%{transform:translateX(-5px)}
          80%{transform:translateX(5px)}
        }
        @keyframes fogPulse {
          0%,100%{opacity:0.3;transform:scale(1)}
          50%{opacity:0.8;transform:scale(1.06)}
        }
        ::-webkit-scrollbar { display: none; }
      `}</style>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<EtymRoot />);
  </script>
</body>
</html>
